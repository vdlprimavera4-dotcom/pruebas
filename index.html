<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Lexend', sans-serif;
            background: #EFEFEF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. NAVBAR EXACTA */
        .navbar {
            background-color: #493b31;
            /* El café de tu diseño */
            width: 100%;
            height: 56px;
            /* Altura controlada */
            display: flex;
            justify-content: flex-end;
            /* Alinea todo a la derecha */
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            /* Ajusta este valor para separar más o menos las palabras */
            align-items: center;
        }

        .nav-links li a {
            color: #F9F9F9;
            text-decoration: none;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: normal;
            letter-spacing: 0.2px;
            padding-bottom: 4px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-links li a:hover {
            color: #D9D7D5;
        }

        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .success {
            color: #27ae60;
        }

        .warning {
            color: #e67e22;
        }

        .btn-cerrar {
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #493b31;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-cerrar:hover {
            background-color: #3a2f28;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #493b31;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .footer {
            background-color: #493b31;
            color: #CEC3BA;
            padding: 30px 40px;
            width: 100%;
        }

        .footer-content {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            margin: 0;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-text {
            text-align: left;
            font-size: 12px;
            letter-spacing: 1.2px;
        }

        .footer-info {
            text-align: rigth;
            font-size: 10.5px;
            line-height: 2;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="https://www.vdlprimavera4.com/contacto">Contacto</a></li>
        </ul>
    </nav>

    <div class="card-container">
        <div class="card" id="mensaje">
            <div class="spinner-container">
                <div class="spinner"></div>
                <p></p>
                <p>Espere...</p>
            </div>
        </div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const urlScript = "https://script.google.com/macros/s/AKfycbyh5vSkr1p5c29bE_n3XSZUrB2RKQDsu7CN8bZqIi9PqCwPGJtCNYBT3Eyp8XvAnQvxCA/exec"; // Asegúrate de poner tu URL real aquí

        fetch(urlScript + "?id=" + id)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('mensaje');

                function formatearFecha(id) {
                    if (id.length === 8) {
                        return `${id.substring(0, 2)}/${id.substring(2, 4)}/${id.substring(4, 8)}`;
                    }
                    return id;
                }

                const fechaFormateada = formatearFecha(data.id);

                if (data.estado === 'exitoso') {
                    container.innerHTML = `
                    <div class="icon">✅</div>
                        <h1 class="success">Confirmación exitosa</h1>
                        <p style="color: #555; font-size: 17px;">
                            Has confirmado exitosamente la ejecución de los bloqueos/desbloqueos solicitados para el día <strong style="color: #333; font-size: 19px;">${fechaFormateada}</strong>. El estatus ha sido actualizado en el sistema..
                        </p>
                    `;
                } else {
                    container.innerHTML = `
                    <div class="icon">⚠️</div>
                        <h1 class="warning">Ya procesado</h1>
                        <p style="color: #555; font-size: 17px;">
                            La confirmación de los cambios correspondientes al día <strong>${fechaFormateada}</strong> ya fue procesada anteriormente.
                        </p>
                    `;
                }
            })
            .catch(() => {
                document.getElementById('mensaje').innerHTML =  `<div class="icon">❌</div><p>Intenta de nuevo más tarde.</p>`;
            });
    </script>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-info">
                <p>Vistas del Lago La Primavera 4, Portal de Residentes</p>
                <p>Comite de Vecinos, enero 2025 - actualidad.</p>
                <br>
                <p><strong>Razón Social:</strong> VDL LA PRIMAVERA 4 AC</p>
                <p><strong>RFC:</strong> VPC250321HW7</p>
                <br>
                <p>Culiacán, Sinaloa.</p>
            </div>

            <div class="footer-logo">
                <div class="logo-text">
                    <p>VISTAS DEL LAGO</p>
                    <p>LA PRIMAVERA 4</p>
                </div>
                <div class="separator"></div>
            </div>
        </div>
    </footer>
</body>

</html>
