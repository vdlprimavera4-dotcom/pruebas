<!DOCTYPE html>
<html>
<body>
  <div id="mensaje">Validando...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const urlScript = "https://script.google.com/macros/s/AKfycbyNJjCdlgeyQ9O3SIEC3xhSJ6K_Zv_S9nUMwrzo-0bklw11luoemF3_4wiB0HpUxd89cg/exec";

    if (!id) {
      document.getElementById('mensaje').innerHTML = "No se detectó un ID.";
    } else {
      fetch(urlScript + "?id=" + id)
        .then(response => response.text())
        .then(data => { document.getElementById('mensaje').innerHTML = data; })
        .catch(err => { document.getElementById('mensaje').innerHTML = "Error: " + err; });
    }
  </script>
</body>
</html>
