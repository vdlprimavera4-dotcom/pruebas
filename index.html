<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- TUS ESTILOS --- */
        body {
            margin: 0;
            font-family: 'Lexend', sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. RESET BÁSICO para eliminar espacios indeseados */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. NAVBAR EXACTA */
        .navbar {
            background-color: #493b31;
            /* El café de tu diseño */
            width: 100%;
            height: 56px;
            /* Altura controlada */
            display: flex;
            justify-content: flex-end;
            /* Alinea todo a la derecha */
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            /* Ajusta este valor para separar más o menos las palabras */
            align-items: center;
        }

        .nav-links li a {
            color: #F9F9F9;
            text-decoration: none;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: normal;
            letter-spacing: 0.2px;
            padding-bottom: 4px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-links li a:hover {
            color: #D9D7D5;
        }

        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .success {
            color: #27ae60;
        }

        .warning {
            color: #e67e22;
        }

        .btn-cerrar {
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #493b31;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-cerrar:hover {
            background-color: #3a2f28;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="https://www.vdlprimavera4.com/contacto">Contacto</a></li>
        </ul>
    </nav>

    <div class="card-container">
        <div class="card" id="mensaje">
            <h1>Procesando...</h1>
        </div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const urlScript = "https://script.google.com/macros/s/AKfycbyh5vSkr1p5c29bE_n3XSZUrB2RKQDsu7CN8bZqIi9PqCwPGJtCNYBT3Eyp8XvAnQvxCA/exec"; // Asegúrate de poner tu URL real aquí

        fetch(urlScript + "?id=" + id)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('mensaje');

                if (data.estado === 'exitoso') {
                    container.innerHTML = `
                        <h1 class="success">✅ Registro Exitoso</h1>
                        <p style="color: #555; font-size: 17px;">
                            El desbloqueo <strong style="color: #333; font-size: 19px;">${data.id}</strong> ha sido validado en el sistema del Portal de Residentes.
                        </p>
                    `;
                } else {
                    container.innerHTML = `
                        <h1 class="warning">⚠️ Ya procesado</h1>
                        <p style="color: #555; font-size: 17px;">
                            El desbloqueo <strong style="color: #333; font-size: 19px;">${data.id}</strong> ya fue confirmado anteriormente por la administración.
                        </p>
                    `;
                }
            })
            .catch(() => {
                document.getElementById('mensaje').innerHTML = "<h1>Error</h1><p>Intenta de nuevo más tarde.</p>";
            });
    </script>
</body>

</html>
