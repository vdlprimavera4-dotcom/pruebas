<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #2d3436; margin-bottom: 10px; }
        p { color: #636e72; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="card" id="mensaje">
        <h2>Procesando...</h2>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const urlScript = "https://script.google.com/macros/s/AKfycbyNJjCdlgeyQ9O3SIEC3xhSJ6K_Zv_S9nUMwrzo-0bklw11luoemF3_4wiB0HpUxd89cg/exec";

        fetch(urlScript + "?id=" + id)
            .then(response => response.text())
            .then(data => {
                // Esto inserta el HTML que viene de Google dentro de la caja bonita
                document.getElementById('mensaje').innerHTML = data;
            })
            .catch(() => {
                document.getElementById('mensaje').innerHTML = "<h1>Error</h1><p>Intenta de nuevo más tarde.</p>";
            });
    </script>
</body>
</html>
