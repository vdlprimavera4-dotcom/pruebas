<!DOCTYPE html>
<html>
<body>
  <div id="mensaje">Procesando...</div>
  <script>
    const id = new URLSearchParams(window.location.search).get('id');
    const urlScript = "https://script.google.com/macros/s/AKfycbyxS6fFotGKw5M4tZTuTeChu-jqk6Y7ga2H2RLKPHiwqJq1pLVVgPWDk_Jk5shm7Wx9uw/exec";

    fetch(urlScript + "?id=" + id)
      .then(response => response.json())
      .then(data => {
        document.getElementById('mensaje').innerHTML = "<h1>" + data.estado + "</h1>";
      })
      .catch(err => {
        document.getElementById('mensaje').innerHTML = "Error de conexión";
      });
  </script>
</body>
</html>
